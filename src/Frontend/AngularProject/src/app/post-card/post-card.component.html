<mat-card class="post-card" appearance="outlined">
    <mat-card-header>
      <div [style.background-image]="'url('+ (userProfile) +')'" mat-card-avatar class="user-image"></div>
      <mat-card-title [textContent]="(userName)"></mat-card-title>
      <mat-card-subtitle>14 mins ago</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <p [textContent]="(postText)"></p>
    </mat-card-content>
    <img mat-card-image [src]="(imageUrl)" alt="Photo of a Shiba Inu">
    <mat-card-actions>
      <button mat-button>LIKE</button>
      <button mat-button>SHARE</button>
    </mat-card-actions>
  </mat-card>

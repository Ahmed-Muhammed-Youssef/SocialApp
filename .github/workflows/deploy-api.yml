name: Build and deploy ASP.Net API to Azure Web App - app-connect-be-dev-westus-01

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  test:
    uses: ./.github/workflows/dotnet-ci.yml

  build:
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Build with dotnet
        run: dotnet build src/API/API/API.csproj --configuration Release

      - name: dotnet publish
        run: dotnet publish src/API/API/API.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  # Azure deployment removed for now (was failing) - to be replaced with a publish-profile based deploy.
  migrate:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      - name: Install EF Core tools
        run: dotnet tool install --global dotnet-ef

      - name: Apply database migrations
        run: dotnet ef database update --project src/API/Infrastructure --startup-project src/API/API
        env:
          ASPNETCORE_ENVIRONMENT: Production
          ConnectionStrings__AppConnection: ${{ secrets.DB_CONNECTION_STRING }}